version: "3.8"

services:
  llmi:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Frontend build-time variables (Supabase public keys — safe to bake in)
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_BACKEND_URL: /api
    container_name: llmi
    restart: unless-stopped
    ports:
      # Bind container's nginx to localhost only — Caddy (on the host)
      # terminates TLS on :443 and proxies here for app.llm-insights.com.
      - "127.0.0.1:${PORT:-8080}:80"
    env_file:
      - .env.production
    environment:
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persist job results (optional)
      - llmi_results:/app/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  llmi_results:
